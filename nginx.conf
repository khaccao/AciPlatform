user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-component text/x-cross-domain-policy;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream definitions
    upstream aciplatform_backend {
        server aciplatform-api:8080;
        keepalive 32;
    }

    upstream aciplatform_frontend {
        server aciplatform-frontend:80;
        keepalive 32;
    }

    # --- FRONTEND: nguyenbinh.info.vn ---
    server {
        listen 80;
        server_name nguyenbinh.info.vn www.nguyenbinh.info.vn;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name nguyenbinh.info.vn www.nguyenbinh.info.vn;

        ssl_certificate /etc/nginx/ssl/live/nguyenbinh.info.vn/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/nguyenbinh.info.vn/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://aciplatform_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- BACKEND: sit.backend.nguyenbinh.info.vn ---
    server {
        listen 80;
        server_name sit.backend.nguyenbinh.info.vn;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name sit.backend.nguyenbinh.info.vn;

        ssl_certificate /etc/nginx/ssl/live/sit.backend.nguyenbinh.info.vn/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/sit.backend.nguyenbinh.info.vn/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location /health {
            proxy_pass http://aciplatform_backend;
            access_log off;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://aciplatform_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location / {
            return 301 https://$host/swagger/index.html;
        }

        location /swagger {
            proxy_pass http://aciplatform_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}


version: '3.8'

services:
  aciplatform-api:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: aciplatform-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=AciPlatform
      - Jwt__Audience=AciPlatformUsers
      - Jwt__ExpireHours=8
    networks:
      - aciplatform-network

  aciplatform-frontend:
    build:
      context: ../AciPlatform_Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://sit.backend.nguyenbinh.info.vn/api
    container_name: aciplatform-frontend
    restart: unless-stopped
    networks:
      - aciplatform-network

  nginx:
    image: nginx:latest
    container_name: aciplatform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/nginx/ssl:ro
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    networks:
      - aciplatform-network
    depends_on:
      - aciplatform-api
      - aciplatform-frontend

networks:
  aciplatform-network:
    driver: bridge

volumes:
  certbot-etc:

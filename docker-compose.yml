version: '3.8'

services:
  aciplatform-api:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
    container_name: aciplatform-api
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${API_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpireHours=${JWT_EXPIRE_HOURS}
    networks:
      - aciplatform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aciplatform-db
    restart: unless-stopped
    environment:
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Express
    ports:
      - "${DB_PORT}:1433"
    networks:
      - aciplatform-network
    volumes:
      - db-data:/var/opt/mssql/data
      - db-log:/var/opt/mssql/log

  nginx:
    image: nginx:latest
    container_name: aciplatform-nginx
    restart: unless-stopped
    ports:
      - "8085:80"
      - "4435:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - aciplatform-network
    depends_on:
      - aciplatform-api

networks:
  aciplatform-network:
    driver: bridge

volumes:
  db-data:
  db-log:

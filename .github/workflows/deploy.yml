name: Build and Deploy API

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - staging
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal --logger "trx"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/root/apps/AciPlatform"
            FRONTEND_DIR="/root/apps/AciPlatform_Frontend"
            
            # 1. Update/Clone Backend Code
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
                echo "Backend directory not found, cloning..."
                mkdir -p $DEPLOY_DIR
                cd $DEPLOY_DIR
                git clone -b staging https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khaccao/AciPlatform.git .
            else
                cd $DEPLOY_DIR
                echo "Updating Backend..."
                git fetch origin staging
                git reset --hard origin/staging
            fi
            
            # 2. Update/Clone Frontend Code
            if [ ! -d "$FRONTEND_DIR/.git" ]; then
                echo "Frontend directory not found, cloning..."
                mkdir -p $FRONTEND_DIR
                cd $FRONTEND_DIR
                git clone -b testing https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/khaccao/AciPlatform_Frontend.git .
            else
                cd $FRONTEND_DIR
                echo "Updating Frontend..."
                git fetch origin testing
                git reset --hard origin/testing
            fi
            
            # 3. Setup .env in Backend Dir
            cd $DEPLOY_DIR
            if [ -f ".env.example" ]; then
                if [ ! -f ".env" ]; then
                    echo "Creating .env from .env.example..."
                    cp .env.example .env
                    sed -i "s/DOCKER_NAMESPACE=your-username/DOCKER_NAMESPACE=khaccao/g" .env
                    sed -i "s/DOCKER_IMAGE_TAG=latest/DOCKER_IMAGE_TAG=staging/g" .env
                fi
            fi
            
            # 4. Docker Sync & Restart
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Navigate back to Backend dir as it contains the docker-compose.yml
            cd $DEPLOY_DIR
            docker compose pull
            docker compose down
            docker compose up -d --build
            
            # 5. Show Status
            sleep 5
            docker ps

  notify:
    if: always()
    needs: [build-and-test, docker-build, deploy]
    runs-on: ubuntu-latest

    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ] || [ "${{ needs.deploy.result }}" == "skipped" ]; then
            echo "Deployment successful!"
          else
            echo "Deployment failed!"
            exit 1
          fi
